apiVersion: v1
kind: Secret
metadata:
  name: mosquitto-auth
  namespace: mqtt-broker
stringData:
  # Replace with output from `mosquitto_passwd -b -c passwordfile <user> <pass>`
  passwordfile: |
    # Example format; will be overwritten with real content
    # user:$7$abcdefg... (bcrypt/sha512 depending on mosquitto version)
