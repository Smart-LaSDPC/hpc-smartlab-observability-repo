apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: mqtt-broker
spec:
  type: ClusterIP
  selector:
    app: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-ws
  namespace: mqtt-broker
spec:
  type: ClusterIP
  selector:
    app: mosquitto
  ports:
    - name: ws
      port: 9001
      targetPort: 9001
